backend:
  name: github
  repo: riso-diluito/Tamburello360
  branch: main
  base_url: https://tamburello360-auth.mattiag030507.workers.dev
  auth_endpoint: /auth

media_folder: public/images/uploads
public_folder: /public/images/uploads

collections:

- name: blog
  label: Articoli Blog
  folder: content/blog
  create: true
  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
  fields:
  - label: Layout
    name: layout
    widget: hidden
    default: post.njk
  - label: Titolo
    name: title
    widget: string
  - label: Data Pubblicazione
    name: date
    widget: datetime
  - label: Autore
    name: author
    widget: string
    default: Redazione Tamburello360
  - label: Categoria
    name: category
    widget: select
    options:
    - Ultimi Risultati
    - Prossimi Incontri
    - Interviste
    - Lo Sport
    - Squadre
  - label: Immagine Copertina
    name: image
    widget: image
    required: false
  - label: Breve Descrizione
    name: excerpt
    widget: text
    required: false
  - label: Contenuto
    name: body
    widget: markdown
  - label: Tempo di Lettura (minuti)
    name: reading_time
    widget: number
    default: 5
    value_type: int
    min: 1

- name: classifiche
  label: Classifica Serie A
  folder: content/classifiche
  create: true
  slug: "{{slug}}"
  fields:
  - label: Permalink
    name: permalink
    widget: hidden
    default: false
  - label: Serie
    name: serie
    widget: hidden
    default: Serie A
  - label: Tipo
    name: tipo
    widget: hidden
    default: outdoor
  - label: Anno
    name: year
    widget: number
    default: 2026
    value_type: int
  - label: Aggiornata al
    name: updated
    widget: datetime
  - label: Retrocesse
    name: retrocesse
    widget: number
    default: 1
    value_type: int
    hint: Numero di squadre retrocesse (usato per evidenziare le ultime N righe in classifica)
  - label: Squadre
    name: teams
    widget: list
    fields:
    - label: Posizione
      name: position
      widget: number
      value_type: int
    - label: Codice Squadra
      name: team_code
      widget: string
      hint: Esempio BAR, ARC, SOL
    - label: Nome Squadra
      name: name
      widget: string
    - label: Punti
      name: points
      widget: number
      value_type: int
    - label: Vittorie
      name: wins
      widget: number
      value_type: int
    - label: Pareggi
      name: draws
      widget: number
      default: 0
      value_type: int
    - label: Sconfitte
      name: losses
      widget: number
      value_type: int
    - label: Partite Giocate
      name: played
      widget: number
      default: 0
      value_type: int
    - label: Forma
      name: form
      widget: string
      required: false

- name: partite
  label: Partite Serie A
  folder: content/partite
  create: true
  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
  fields:
  - label: Permalink
    name: permalink
    widget: hidden
    default: false
  - label: ID Partita
    name: id
    widget: string
  - label: Serie
    name: serie
    widget: hidden
    default: A
  - label: Giornata
    name: giornata
    widget: number
    default: 1
    value_type: int
  - label: Squadra Casa
    name: squadra_casa
    widget: string
    hint: Usa il team_code della squadra, ad esempio BAR o ARC
  - label: Squadra Ospite
    name: squadra_ospite
    widget: string
    hint: Usa il team_code della squadra, ad esempio SOL o SEG
  - label: Data Partita
    name: data
    widget: datetime
  - label: Stato
    name: stato
    widget: select
    options:
    - label: Da giocare
      value: da_giocare
    - label: Giocata
      value: giocata
  - label: Gol Casa
    name: gol_casa
    widget: number
    required: false
    value_type: int
  - label: Gol Ospite
    name: gol_ospite
    widget: number
    required: false
    value_type: int

- name: squadre
  label: Squadre Serie A
  folder: content/squadre
  create: true
  slug: "{{name | slug}}"
  fields:
  - label: Permalink
    name: permalink
    widget: hidden
    default: false
  - label: Codice Squadra
    name: team_code
    widget: string
    hint: Esempio BAR, ARC, SOL
  - label: Slug
    name: slug
    widget: string
    hint: Esempio bardolino, arcene, solferino
  - label: Nome Squadra
    name: name
    widget: string
  - label: Citta
    name: city
    widget: string
  - label: Serie
    name: serie
    widget: hidden
    default: Serie A
  - label: Latitudine
    name: lat
    widget: number
    value_type: float
    hint: Trova su Google Maps
  - label: Longitudine
    name: lng
    widget: number
    value_type: float
    hint: Trova su Google Maps
  - label: Logo
    name: logo
    widget: image
    required: false
    media_folder: /public/images/teams
    public_folder: /images/teams
  - label: Colore Primario
    name: color_primary
    widget: string
    required: false
    hint: Codice HEX dominante del logo, ad esempio #E87722
  - label: Link Stadio
    name: stadium_url
    widget: string
    required: false
    hint: Se presente viene usato al posto del link Google Maps automatico
  - label: Sito Web
    name: website
    widget: string
    required: false
  - label: Descrizione
    name: description
    widget: text
    required: false
